<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLN Thermal Modern</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>

<body>

<div class="phone">

  <div class="header">
    <h1>PLN Thermal 56mm</h1>
    <p>OCR Screenshot + Print Thermal</p>
  </div>

  <div class="content">

    <div class="section-title">
      1. Upload Screenshot
    </div>

    <input
      type="file"
      id="imageInput"
      accept="image/*"
    >

    <button onclick="scanOCR()">
      Scan OCR
    </button>

    <img id="preview">

    <div class="section-title">
      2. Hasil OCR
    </div>

    <input type="text" id="token" placeholder="Nomor Token">
    <input type="text" id="pelanggan" placeholder="Nama Pelanggan">
    <input type="text" id="tarif" placeholder="Tarif / Daya">
    <input type="text" id="meter" placeholder="Nomor Meter">
    <input type="text" id="kwh" placeholder="Jumlah kWh">
    <input type="text" id="nominal" placeholder="Nominal">
    <input type="text" id="harga" placeholder="Harga di Struk">

    <button class="print" onclick="printReceipt()">
      Cetak Struk
    </button>

  </div>

</div>

<div id="receipt">

  <div class="center">
    <h2>Gareng Cell</h2>
    <div>Desa Sangkanayu RT 002/RW 001</div>
    <div>0822-4263-8516</div>
  </div>

  <div class="line"></div>

  <div class="row">
    <span>Tanggal</span>
    <span id="dateNow"></span>
  </div>

  <div class="line"></div>

  <div class="center bigtitle">
    TOKEN PLN
  </div>

  <div class="bigtoken" id="rToken"></div>

  <div class="line"></div>

  <div class="row">
    <span>Nama Pelanggan</span>
    <span id="rPelanggan"></span>
  </div>

  <div class="row">
    <span>Tarif/Daya</span>
    <span id="rTarif"></span>
  </div>

  <div class="row">
    <span>Nomor Meter</span>
    <span id="rMeter"></span>
  </div>

  <div class="row">
    <span>Jumlah kWh</span>
    <span id="rKwh"></span>
  </div>

  <div class="row">
    <span>Nominal</span>
    <span id="rNominal"></span>
  </div>

  <div class="row">
    <span>Harga</span>
    <span id="rHarga"></span>
  </div>

  <div class="line"></div>

  <div class="center thanks">
    TERIMA KASIH
    <br>
    SEMOGA BERMANFAAT
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
