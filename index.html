<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLN Thermal 56mm</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>

<body>

<div class="phone">

  <div class="header">
    <h1>PLN Thermal 56mm</h1>
    <p>OCR Screenshot ShopeePay + Thermal Print</p>
  </div>

  <div class="content">

    <div class="card">

      <h3>Upload Screenshot</h3>

      <input
        type="file"
        id="imageInput"
        accept="image/*"
      >

      <button onclick="scanOCR()">
        Scan OCR
      </button>

      <img id="preview">

    </div>

    <div class="card">

      <h3>Hasil OCR</h3>

      <input type="text" id="token" placeholder="Nomor Token">
      <input type="text" id="pelanggan" placeholder="Nama Pelanggan">
      <input type="text" id="tarif" placeholder="Tarif / Daya">
      <input type="text" id="meter" placeholder="Nomor Meter">
      <input type="text" id="kwh" placeholder="Jumlah kWh">
      <input type="text" id="nominal" placeholder="Nominal">
      <input type="text" id="harga" placeholder="Harga di Struk">

      <button class="print" onclick="printReceipt()">
        Cetak Struk
      </button>

    </div>

  </div>

</div>

<div id="receipt">

  <div class="center">
    <h2>TOKO LISTRIK</h2>
    <div>Jl. Contoh No.123</div>
    <div>0812-3456-7890</div>
  </div>

  <div class="line"></div>

  <div class="row">
    <span>Tanggal</span>
    <span id="dateNow"></span>
  </div>

  <div class="line"></div>

  <div class="center title">
    TOKEN PLN
  </div>

  <div class="token-big" id="rToken"></div>

  <div class="line"></div>

  <div class="row">
    <span>Nama Pelanggan</span>
    <span id="rPelanggan"></span>
  </div>

  <div class="row">
    <span>Tarif/Daya</span>
    <span id="rTarif"></span>
  </div>

  <div class="row">
    <span>Nomor Meter</span>
    <span id="rMeter"></span>
  </div>

  <div class="row">
    <span>Jumlah kWh</span>
    <span id="rKwh"></span>
  </div>

  <div class="row">
    <span>Nominal</span>
    <span id="rNominal"></span>
  </div>

  <div class="row">
    <span>Harga di Struk</span>
    <span id="rHarga"></span>
  </div>

  <div class="line"></div>

  <div class="center thanks">
    TERIMA KASIH
    <br>
    SEMOGA BERMANFAAT
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
